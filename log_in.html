<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/login.css">

<title>TAC Log In</title>

</head>

<body>

<img src="icons/tac.png" id="logo">

<div id="loginbx">
        
        <h2 id="heading">NSAT LOGIN</h2>

        <hr class="sep">

        <form onsubmit="loginAccount(event)">
            <label for="email">Email Address</label>
            <input type="email" id="email" required>

            

            <label for="pwd">Password</label>
            <input type="password" id="pwd" required>

            <button class="button1" type="submit">Log In</button>
        </form>

        <div class="signup-section">
            <p id="alert-msg"></p>
            <p>No account yet?</p>
            <button class="loginbutton" type="button" onclick="document.location='sign_up.html'">Sign Up</button>
        </div>

    </div>

<script src="/scripts/authorization.js"></script>
</div>
</body>



</html>
