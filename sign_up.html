<!DOCTYPE html>

<html>

<head>


<link rel="stylesheet" href="styles/login.css">

<link rel="icon" type="image/png" href="icons/nsat_icon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TAC Sign Up</title>

</head>


<body>

    <img src="icons/tac.png" id="logo">

    <div id="loginbx">
        
        <h2>NSAT SIGN-UP</h2>

        <form onsubmit="createAccount(event)">
            <div class="form-columns">
                
                <div class="column">
                    <label for="name">Name</label>
                    <input type="text" id="name" required>

                    <label for="pwd">Password</label>
                    <input type="password" id="pwd" required>

                    <label for="cpwd">Confirm Password</label>
                    <input type="password" id="cpwd" required>
                </div>

                <div class="column">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>

                    <label for="mob">Mobile No.</label>
                    <input type="tel" id="mob" required>
                </div>

            </div>
            <button class="button1" class="submit-btn">Create Account</button>
        </form>

        <div class="signup-section">
            <p id="alert-msg"></p>
            <p id="statusMessage"></p>
            <p>Already have an account?</p>
            <button class="loginbutton" type="button" onclick="document.location='log_in.html'">Log in</button>
        </div>

    </div>

    <script src="/scripts/authorization.js"></script>

</body>
</html>
